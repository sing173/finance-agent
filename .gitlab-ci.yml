# finance-agent 打包流水线
# 说明：
#   - 仅“手动 Run pipeline”时执行（不随 push 自动跑）
#   - hap 构建拆分为多个 job（prepare → backend → frontend → pack），
#     任一步失败可单独重试，无需从头重跑（通过 cache 传递工作区 _ws/）
#   - 自动克隆缺失的兄弟工程（finance_agent_hnp / finance-assistant-ohos）
#   - 产物复制到仓库内 release/ 并作为 artifact 收集，再创建 GitLab Release
#   - 同一 commit（同一版本）下允许多种产物共存：hap-release / hap-debug / exe
#
# 流水线参数（Run pipeline 页面可输入/选择）：
#   BUILD_TYPE: hap（默认）| exe | all   —— 构建哪种产物
#   BUILD_MODE: release（默认）| debug    —— hap 的构建模式（exe 不区分）
#
# 前置要求：
#   - hap 链 4 个 job 使用预构建镜像 192.168.1.172:5001/ohos-build:latest
#     （已内置 node22 + git + JDK17 + hnpcli/hvigorw/ohpm，见 docker/ohos-build/Dockerfile）
#   - build_exe 仍用 192.168.1.172:5001/node:22-bullseye（exe 打包暂未启用；
#     启用前需在该镜像外加 python3 + wine，或单独做 exe 构建镜像）

stages:
  - prepare
  - backend
  - frontend
  - pack

variables:
  # 产物复制目录（相对仓库根）  # 创建 GitLab Release 需配 CI/CD Variable: GITLAB_RELEASE_TOKEN
  #   （项目/个人 Access Token，scope 含 api；建议 Masked。不写在此文件以免泄露）
  # 工作区根：CI 中指向仓库内 _ws/，使兄弟工程可被 cache 传递（本地留空即用默认同级布局）
  WORKSPACE_ROOT: "$CI_PROJECT_DIR/_ws"
  # HAP 构建模式：release（默认）| debug；Run pipeline 页面可在 Variables 框手动覆盖
  BUILD_MODE:
    value: "release"
    description: "HAP 构建模式：release（默认）| debug"
  # 构建产物类型：hap（默认）| exe | all；Run pipeline 页面可在 Variables 框手动覆盖
  BUILD_TYPE:
    value: "hap"
    description: "构建产物类型：hap（默认）| exe | all"
  NPM_REGISTRY: "https://registry.npmmirror.com/"
  # Electron 二进制镜像（npm install 时 postinstall 默认从 GitHub 拉运行时二进制，内网会被墙/超时，改用 npmmirror）
  ELECTRON_MIRROR: "https://registry.npmmirror.com/-/binary/electron/"
  # electron-builder 二进制镜像（打 exe 时下载 app-builder 等工具，同样从 GitHub 拉）
  ELECTRON_BUILDER_BINARIES_MIRROR: "https://registry.npmmirror.com/-/binary/electron-builder-binaries/"

# 跨 job 共享工作区（兄弟工程 _ws/ + 依赖 node_modules/），以流水线为粒度缓存
cache:
  key: "$CI_PIPELINE_ID"
  paths:
    - _ws/
    - node_modules/

# ============ HAP 构建链 ============

# 1) 准备：克隆兄弟工程 + 安装依赖（最慢、最稳的一步，单独抽离便于重试）
prepare_hap:
  image: 192.168.1.172:5001/ohos-build:latest
  stage: prepare
  rules:
    - if: $CI_PIPELINE_SOURCE == "web" && $BUILD_TYPE =~ /^(hap|all)$/
  before_script:
    - npm config set registry "$NPM_REGISTRY"
    - npm install
    - chmod +x ./scripts/*.sh
  script:
    # 仅克隆兄弟工程（不构建），依赖通过 cache 在后续 job 复用
    - bash -c 'source ./scripts/common.sh; clone_if_missing "$GIT_HNP_URL" "$PROJECT_HNP" hnp; clone_if_missing "$GIT_OHOS_URL" "$PROJECT_OHOS" ohos'
  tags:
    - docker

# 2) 后端：打包 HNP 并同步到 OHOS 工程
build_backend:
  image: 192.168.1.172:5001/ohos-build:latest
  stage: backend
  needs: [prepare_hap]
  rules:
    - if: $CI_PIPELINE_SOURCE == "web" && $BUILD_TYPE =~ /^(hap|all)$/
  before_script:
    - npm config set registry "$NPM_REGISTRY"
    - chmod +x ./scripts/*.sh
    - 'command -v hnpcli >/dev/null 2>&1 && echo "hnpcli: OK" || echo "WARN: hnpcli 不在 PATH"'
  script:
    - ./scripts/update-backend.sh
  tags:
    - docker

# 3) 前端：构建 renderer 并同步到 OHOS 工程
build_frontend:
  image: 192.168.1.172:5001/ohos-build:latest
  stage: frontend
  needs: [build_backend]
  rules:
    - if: $CI_PIPELINE_SOURCE == "web" && $BUILD_TYPE =~ /^(hap|all)$/
  before_script:
    - npm config set registry "$NPM_REGISTRY"
    - chmod +x ./scripts/*.sh
  script:
    - ./scripts/update-frontend.sh
  tags:
    - docker

# 4) 打包：hvigorw 构建 HAP 并产出 release/（含 GitLab Release）
build_pack:
  image: 192.168.1.172:5001/ohos-build:latest
  stage: pack
  needs: [build_frontend]
  rules:
    - if: $CI_PIPELINE_SOURCE == "web" && $BUILD_TYPE =~ /^(hap|all)$/
  before_script:
    - npm config set registry "$NPM_REGISTRY"
    - chmod +x ./scripts/*.sh
    - 'command -v hvigorw >/dev/null 2>&1 && echo "hvigorw: OK" || echo "WARN: hvigorw 不在 PATH"'
    - 'command -v ohpm >/dev/null 2>&1 && echo "ohpm: OK" || echo "WARN: ohpm 不在 PATH"'
  script:
    - ./scripts/pack-ohos.sh "$BUILD_MODE"
    - |
      TAG="${CI_COMMIT_SHORT_SHA}-${BUILD_MODE}"
      REL_URL="${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/releases"
      # 确保 tag 存在（部分老版本 Releases API 要求 tag 已存在，否则报 tag not found）
      curl -s --request POST --header "PRIVATE-TOKEN: ${GITLAB_RELEASE_TOKEN}"         --data "tag_name=${TAG}" --data "ref=${CI_COMMIT_SHA}"         "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/repository/tags" >/dev/null || true
      # 同产物重跑：删除旧 Release 后重建（标签保留，实现覆盖）
      curl -s --request DELETE --header "PRIVATE-TOKEN: ${GITLAB_RELEASE_TOKEN}"         "${REL_URL}/${TAG}" >/dev/null || true
      # 创建 GitLab Release，链接指向本 job 的 artifacts（有效期同 artifacts.expire_in）
      PAYLOAD=$(node -e 'console.log(JSON.stringify({name:process.env.RNAME,tag_name:process.env.RTAG,description:process.env.RDESC,assets:{links:[{name:process.env.RLNAME,url:process.env.RURL}]}}))'         RNAME="HAP ${CI_COMMIT_SHORT_SHA} (${BUILD_MODE})"         RTAG="$TAG"         RDESC="自动构建的 HarmonyOS HAP（${BUILD_MODE} 模式）| commit ${CI_COMMIT_SHORT_SHA}"         RLNAME="finance-assistant-ohos-${BUILD_MODE}.hap"         RURL="${CI_SERVER_URL}/api/v4/projects/${CI_PROJECT_ID}/jobs/${CI_JOB_ID}/artifacts/release/finance-assistant-ohos-${BUILD_MODE}.hap")
      curl -s --request POST --header "PRIVATE-TOKEN: ${GITLAB_RELEASE_TOKEN}" --header "Content-Type: application/json" --data "$PAYLOAD" "${REL_URL}"
      echo "Release 已创建 (tag: ${TAG})"
  artifacts:
    paths:
      - release/
    expire_in: 30 days
  tags:
    - docker

# ============ EXE 构建（单 job，独立 stage 起始） ============
build_exe:
  image: 192.168.1.172:5001/node:22-bullseye
  stage: backend
  rules:
    - if: $CI_PIPELINE_SOURCE == "web" && $BUILD_TYPE =~ /^(exe|all)$/
  before_script:
    - npm config set registry "$NPM_REGISTRY"
    - npm install
    - chmod +x ./scripts/package.sh
    - 'command -v python3 >/dev/null 2>&1 && echo "python3: OK" || echo "WARN: python3 不在 PATH（exe 打包需要）"'
  script:
    - ./scripts/package.sh win
    - |
      EXE=$(ls release/*.exe 2>/dev/null | head -1)
      if [ -n "$EXE" ]; then
        cp -f "$EXE" "release/finance-agent-setup.exe"
        echo "EXE 产物: $EXE -> release/finance-agent-setup.exe"
      else
        echo "WARN: 未找到 exe 产物（package.sh 可能未产出 release/*.exe）" >&2
      fi
      TAG="${CI_COMMIT_SHORT_SHA}-exe"
      REL_URL="${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/releases"
      curl -s --request POST --header "PRIVATE-TOKEN: ${GITLAB_RELEASE_TOKEN}"         --data "tag_name=${TAG}" --data "ref=${CI_COMMIT_SHA}"         "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/repository/tags" >/dev/null || true
      curl -s --request DELETE --header "PRIVATE-TOKEN: ${GITLAB_RELEASE_TOKEN}"         "${REL_URL}/${TAG}" >/dev/null || true
      PAYLOAD=$(node -e 'console.log(JSON.stringify({name:process.env.RNAME,tag_name:process.env.RTAG,description:process.env.RDESC,assets:{links:[{name:process.env.RLNAME,url:process.env.RURL}]}}))'         RNAME="EXE ${CI_COMMIT_SHORT_SHA}"         RTAG="$TAG"         RDESC="自动构建的 Windows 安装包 | commit ${CI_COMMIT_SHORT_SHA}"         RLNAME="finance-agent-setup.exe"         RURL="${CI_SERVER_URL}/api/v4/projects/${CI_PROJECT_ID}/jobs/${CI_JOB_ID}/artifacts/release/finance-agent-setup.exe")
      curl -s --request POST --header "PRIVATE-TOKEN: ${GITLAB_RELEASE_TOKEN}" --header "Content-Type: application/json" --data "$PAYLOAD" "${REL_URL}"
      echo "Release 已创建 (tag: ${TAG})"
  artifacts:
    paths:
      - release/
    expire_in: 30 days
  tags:
    - docker
