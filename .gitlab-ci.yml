# finance-agent 打包流水线
# 说明：
#   - 仅“手动 Run pipeline”时执行（不随 push 自动跑）
#   - hap 构建拆分为多个 job（prepare → backend → frontend → pack），
#     任一步失败可单独重试，无需从头重跑（通过 cache 传递工作区 _ws/）
#   - 自动克隆缺失的兄弟工程（finance_agent_hnp / finance-assistant-ohos）
#   - 产物复制到仓库内 release/ 并作为 artifact 收集，再创建 GitLab Release
#   - 同一 commit（同一版本）下允许多种产物共存：hap-release / hap-debug / exe
#
# 流水线参数（Run pipeline 页面可输入/选择）：
#   BUILD_TYPE: hap（默认）| exe | all   —— 构建哪种产物
#   BUILD_MODE: release（默认）| debug    —— hap 的构建模式（exe 不区分）
#
# 前置要求（构建镜像 / runner 需具备）：
#   - git、node(>=22)（rsync 可选；python3 仅 exe 打包需要）
#   - hnpcli / hvigorw + ohpm（OHOS 工具链，hap 需要）
#   - exe 在 Linux 上构建需 wine；或改用 Windows runner

stages:
  - prepare
  - backend
  - frontend
  - pack

variables:
  # 产物复制目录（相对仓库根）
  RELEASE_DIR: "release"
  # 工作区根：CI 中指向仓库内 _ws/，使兄弟工程可被 cache 传递（本地留空即用默认同级布局）
  WORKSPACE_ROOT: "$CI_PROJECT_DIR/_ws"
  # HAP 构建模式：release（默认）| debug；Run pipeline 页面可在 Variables 框手动覆盖
  BUILD_MODE: "release"
  # 构建产物类型：hap（默认）| exe | all；Run pipeline 页面可在 Variables 框手动覆盖
  BUILD_TYPE: "hap"
  NPM_REGISTRY: "https://registry.npmmirror.com/"

# 跨 job 共享工作区（兄弟工程 _ws/ + 依赖 node_modules/），以流水线为粒度缓存
cache:
  key: "$CI_PIPELINE_ID"
  paths:
    - _ws/
    - node_modules/

# ============ HAP 构建链 ============

# 1) 准备：克隆兄弟工程 + 安装依赖（最慢、最稳的一步，单独抽离便于重试）
prepare_hap:
  image: 192.168.1.172:5001/node:22-bullseye
  stage: prepare
  rules:
    - if: $CI_PIPELINE_SOURCE == "web" && $BUILD_TYPE =~ /^(hap|all)$/
  before_script:
    - npm config set registry "$NPM_REGISTRY"
    - npm install
    - chmod +x ./scripts/*.sh
  script:
    # 仅克隆兄弟工程（不构建），依赖通过 cache 在后续 job 复用
    - bash -c 'source ./scripts/common.sh; clone_if_missing "$GIT_HNP_URL" "$PROJECT_HNP" hnp; clone_if_missing "$GIT_OHOS_URL" "$PROJECT_OHOS" ohos'
  tags:
    - docker

# 2) 后端：打包 HNP 并同步到 OHOS 工程
build_backend:
  image: 192.168.1.172:5001/node:22-bullseye
  stage: backend
  needs: [prepare_hap]
  rules:
    - if: $CI_PIPELINE_SOURCE == "web" && $BUILD_TYPE =~ /^(hap|all)$/
  before_script:
    - npm config set registry "$NPM_REGISTRY"
    - chmod +x ./scripts/*.sh
    - 'command -v hnpcli >/dev/null 2>&1 && echo "hnpcli: OK" || echo "WARN: hnpcli 不在 PATH"'
  script:
    - ./scripts/update-backend.sh
  tags:
    - docker

# 3) 前端：构建 renderer 并同步到 OHOS 工程
build_frontend:
  image: 192.168.1.172:5001/node:22-bullseye
  stage: frontend
  needs: [build_backend]
  rules:
    - if: $CI_PIPELINE_SOURCE == "web" && $BUILD_TYPE =~ /^(hap|all)$/
  before_script:
    - npm config set registry "$NPM_REGISTRY"
    - chmod +x ./scripts/*.sh
  script:
    - ./scripts/update-frontend.sh
  tags:
    - docker

# 4) 打包：hvigorw 构建 HAP 并产出 release/（含 GitLab Release）
build_pack:
  image: 192.168.1.172:5001/node:22-bullseye
  stage: pack
  needs: [build_frontend]
  rules:
    - if: $CI_PIPELINE_SOURCE == "web" && $BUILD_TYPE =~ /^(hap|all)$/
  before_script:
    - npm config set registry "$NPM_REGISTRY"
    - chmod +x ./scripts/*.sh
    - 'command -v hvigorw >/dev/null 2>&1 && echo "hvigorw: OK" || echo "WARN: hvigorw 不在 PATH"'
    - 'command -v ohpm >/dev/null 2>&1 && echo "ohpm: OK" || echo "WARN: ohpm 不在 PATH"'
  script:
    - ./scripts/pack-ohos.sh "$BUILD_MODE"
    # 同一 commit 下，不同产物用各自 tag，互不覆盖；仅“同一产物重跑”才删除旧 release 后重建
    - |
      TAG="${CI_COMMIT_SHORT_SHA}-${BUILD_MODE}"
      curl -s --request DELETE \
        --header "JOB-TOKEN: $CI_JOB_TOKEN" \
        "$CI_API_V4_URL/projects/$CI_PROJECT_ID/releases/$TAG" >/dev/null || true
  artifacts:
    paths:
      - release/
    expire_in: 30 days
  # 以 "<commit短hash>-<模式>" 为 tag；同 commit 的 release 与 debug 互不影响
  release:
    tag_name: "${CI_COMMIT_SHORT_SHA}-${BUILD_MODE}"
    name: "HAP ${CI_COMMIT_SHORT_SHA} (${BUILD_MODE})"
    description: "自动构建的 HarmonyOS HAP（${BUILD_MODE} 模式）| commit ${CI_COMMIT_SHORT_SHA}"
    assets:
      links:
        - name: "finance-assistant-ohos-${BUILD_MODE}.hap"
          url: "${CI_SERVER_URL}/api/v4/projects/${CI_PROJECT_ID}/jobs/${CI_JOB_ID}/artifacts/release/finance-assistant-ohos-${BUILD_MODE}.hap"
  tags:
    - docker

# ============ EXE 构建（单 job，独立 stage 起始） ============
build_exe:
  image: 192.168.1.172:5001/node:22-bullseye
  stage: backend
  rules:
    - if: $CI_PIPELINE_SOURCE == "web" && $BUILD_TYPE =~ /^(exe|all)$/
  before_script:
    - npm config set registry "$NPM_REGISTRY"
    - npm install
    - chmod +x ./scripts/package.sh
    - 'command -v python3 >/dev/null 2>&1 && echo "python3: OK" || echo "WARN: python3 不在 PATH（exe 打包需要）"'
  script:
    - ./scripts/package.sh win
    - |
      EXE=$(ls release/*.exe 2>/dev/null | head -1)
      if [ -n "$EXE" ]; then
        cp -f "$EXE" "release/finance-agent-setup.exe"
        echo "EXE 产物: $EXE -> release/finance-agent-setup.exe"
      else
        echo "WARN: 未找到 exe 产物（package.sh 可能未产出 release/*.exe）" >&2
      fi
      TAG="${CI_COMMIT_SHORT_SHA}-exe"
      curl -s --request DELETE \
        --header "JOB-TOKEN: $CI_JOB_TOKEN" \
        "$CI_API_V4_URL/projects/$CI_PROJECT_ID/releases/$TAG" >/dev/null || true
  artifacts:
    paths:
      - release/
    expire_in: 30 days
  release:
    tag_name: "${CI_COMMIT_SHORT_SHA}-exe"
    name: "EXE ${CI_COMMIT_SHORT_SHA}"
    description: "自动构建的 Windows 安装包 | commit ${CI_COMMIT_SHORT_SHA}"
    assets:
      links:
        - name: "finance-agent-setup.exe"
          url: "${CI_SERVER_URL}/api/v4/projects/${CI_PROJECT_ID}/jobs/${CI_JOB_ID}/artifacts/release/finance-agent-setup.exe"
  tags:
    - docker
